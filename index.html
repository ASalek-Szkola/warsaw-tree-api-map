<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drzewa Warszawy - test API</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQpT7HvIsHlpZx6LwzLZfD6yN2cwKyk="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-labelledby="page-title">
        <div class="title-block">
          <p class="eyebrow">API UM Warszawa</p>
          <h1 id="page-title">Drzewa w Warszawie</h1>
          <p class="lead">
            Testowy podglad danych z endpointu
            <code>datastore_search</code> dla pojedynczych drzew.
          </p>
        </div>

        <form id="tree-form" class="filters">
          <label>
            Dzielnica
            <input
              id="district"
              name="district"
              type="text"
              placeholder="np. Wola"
              autocomplete="off"
            />
          </label>

          <label>
            Gatunek lub tekst
            <input
              id="query"
              name="query"
              type="search"
              placeholder="np. dab, lipa"
              autocomplete="off"
            />
          </label>

          <label>
            Limit
            <input id="limit" name="limit" type="number" min="1" max="500" value="50" />
          </label>

          <label class="nolimit">
            <input id="no-limit" name="no_limit" type="checkbox" /> Bez limitu (pobierz wszystko)
          </label>

          <div class="actions">
            <button type="submit">Pobierz drzewa</button>
            <button id="download-geojson" type="button" class="secondary" disabled>
              GeoJSON
            </button>
          </div>
        </form>

        <div class="status-row" aria-live="polite">
          <strong id="status">Gotowe do pobrania danych.</strong>
          <span id="endpoint-preview"></span>
        </div>
      </section>

      <section class="map-panel" aria-label="Mapa drzew">
        <div id="map"></div>
      </section>

      <section class="results-panel" aria-labelledby="results-title">
        <div class="results-header">
          <h2 id="results-title">Wyniki</h2>
          <span id="count">0 rekordow</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Gatunek</th>
                <th>Dzielnica</th>
                <th>Adres / lokalizacja</th>
                <th>Wysokosc</th>
                <th>Stan</th>
                <th>WGS84</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr>
                <td colspan="6" class="empty">Wybierz parametry i pobierz dane.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
